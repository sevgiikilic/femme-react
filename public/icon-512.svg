<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="40%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#4a1d7a"/>
      <stop offset="55%" stop-color="#2a1050"/>
      <stop offset="100%" stop-color="#100828"/>
    </radialGradient>
    <mask id="moon">
      <rect width="512" height="512" fill="black"/>
      <circle cx="234" cy="224" r="134" fill="white"/>
      <circle cx="294" cy="176" r="118" fill="black"/>
    </mask>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Soft glow behind moon -->
  <circle cx="234" cy="224" r="160" fill="#ff8fc4" opacity="0.07"/>

  <!-- Crescent moon -->
  <circle cx="234" cy="224" r="134" fill="#ffd23f" mask="url(#moon)"/>

  <!-- Large 4-pointed star -->
  <path d="M405 68 L410 84 L426 90 L410 96 L405 112 L400 96 L384 90 L400 84 Z" fill="#ff8fc4" opacity="0.95"/>
  <!-- Medium star -->
  <path d="M100 116 L104 128 L116 132 L104 136 L100 148 L96 136 L84 132 L96 128 Z" fill="#ffd23f" opacity="0.85"/>
  <!-- Small star -->
  <path d="M432 290 L434 296 L440 298 L434 300 L432 306 L430 300 L424 298 L430 296 Z" fill="#c89aff" opacity="0.9"/>

  <!-- Dot stars -->
  <circle cx="74"  cy="348" r="5"   fill="#88f4e8" opacity="0.75"/>
  <circle cx="448" cy="160" r="4"   fill="#ffd23f" opacity="0.70"/>
  <circle cx="132" cy="432" r="4"   fill="#ff8fc4" opacity="0.70"/>
  <circle cx="420" cy="400" r="4.5" fill="#c89aff" opacity="0.65"/>
  <circle cx="460" cy="375" r="3"   fill="#ffd23f" opacity="0.60"/>
  <circle cx="58"  cy="190" r="3"   fill="#ff8fc4" opacity="0.60"/>

  <!-- femme label -->
  <text x="256" y="452" font-family="'Courier New',monospace" font-size="38" font-weight="700"
    fill="#fbeacb" text-anchor="middle" opacity="0.8" letter-spacing="14">femme</text>
</svg>
