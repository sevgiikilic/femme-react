<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="bg" cx="40%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#4a1d7a"/>
      <stop offset="55%" stop-color="#2a1050"/>
      <stop offset="100%" stop-color="#100828"/>
    </radialGradient>
    <mask id="moon">
      <rect width="192" height="192" fill="black"/>
      <circle cx="88" cy="84" r="50" fill="white"/>
      <circle cx="110" cy="66" r="44" fill="black"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" fill="url(#bg)"/>

  <!-- Soft moon glow -->
  <circle cx="88" cy="84" r="60" fill="#ff8fc4" opacity="0.08"/>

  <!-- Crescent moon -->
  <circle cx="88" cy="84" r="50" fill="#ffd23f" mask="url(#moon)"/>

  <!-- Star sparkles -->
  <path d="M152 26 L154 32 L160 34 L154 36 L152 42 L150 36 L144 34 L150 32 Z" fill="#ff8fc4" opacity="0.95"/>
  <path d="M38 44 L39.5 48 L44 49.5 L39.5 51 L38 55 L36.5 51 L32 49.5 L36.5 48 Z" fill="#ffd23f" opacity="0.85"/>
  <path d="M162 108 L163 111 L166 112 L163 113 L162 116 L161 113 L158 112 L161 111 Z" fill="#c89aff" opacity="0.9"/>

  <!-- Tiny dot stars -->
  <circle cx="28" cy="130" r="2"   fill="#88f4e8" opacity="0.75"/>
  <circle cx="168" cy="60"  r="1.5" fill="#ffd23f" opacity="0.7"/>
  <circle cx="50"  cy="162" r="1.5" fill="#ff8fc4" opacity="0.7"/>
  <circle cx="158" cy="150" r="1.8" fill="#c89aff" opacity="0.65"/>
  <circle cx="170" cy="140" r="1.2" fill="#ffd23f" opacity="0.6"/>
  <circle cx="22"  cy="70"  r="1.2" fill="#ff8fc4" opacity="0.6"/>

  <!-- femme label -->
  <text x="96" y="168" font-family="'Courier New',monospace" font-size="14" font-weight="700"
    fill="#fbeacb" text-anchor="middle" opacity="0.8" letter-spacing="5">femme</text>
</svg>
